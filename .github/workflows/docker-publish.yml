# GitHub Actions 워크플로우 정의 파일
# .github/workflows/ 디렉토리에 위치해야 GitHub이 자동 인식

# 워크플로우 이름 (GitHub Actions 탭에 표시됨)
name: Build & Push Frontend Image

# 트리거 조건
on:
  # 태그 푸시 시 실행 (수동 릴리스)
  push:
    tags:
      - 'v*'

  # 매일 KST 자정 자동 실행 (UTC 15:00)
  schedule:
    - cron: '0 15 * * *'

# 환경변수: 아래 jobs에서 ${{ env.XXX }}로 참조 가능
env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/banhyungil/quasar-frontend

# 실행할 작업 목록
jobs:
  build:
    # GitHub이 제공하는 Ubuntu 가상머신에서 실행
    runs-on: ubuntu-latest

    # 이 job에 부여할 권한
    permissions:
      contents: read    # 리포 소스 읽기
      packages: write   # ghcr.io에 이미지 푸시

    # 순차적으로 실행되는 단계들
    steps:
      # 1. 리포지토리 소스코드를 가상머신에 체크아웃
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (커밋 날짜 비교에 필요)

      # 2. 스케줄 실행 시, 24시간 내 커밋이 없으면 빌드 건너뛰기
      - name: Check for new commits (24h)
        id: check
        if: github.event_name == 'schedule'
        run: |
          COMMITS=$(git log --since="24 hours ago" --oneline)
          if [ -z "$COMMITS" ]; then
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
            echo "No commits in last 24h — skipping build"
          else
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
            echo "Found commits:"
            echo "$COMMITS"
          fi

      # 3. ghcr.io에 로그인 (이미지 푸시 권한 획득)
      #    secrets.GITHUB_TOKEN은 GitHub이 자동 제공하는 토큰 (별도 설정 불필요)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'schedule' || steps.check.outputs.HAS_CHANGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 이미지 태그 결정
      #    - 태그 푸시: v1.0.0 → 1.0.0 + latest
      #    - 스케줄: nightly-YYYYMMDD + latest
      - name: Determine image tag
        id: tag
        if: github.event_name != 'schedule' || steps.check.outputs.HAS_CHANGES == 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TAG=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "TAG=nightly-$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      # 5. Docker 이미지 빌드 & ghcr.io에 푸시
      - name: Build and push
        if: github.event_name != 'schedule' || steps.check.outputs.HAS_CHANGES == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VITE_API_HOST=
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE }}:latest
