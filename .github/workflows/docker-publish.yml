# GitHub Actions 워크플로우 정의 파일
# .github/workflows/ 디렉토리에 위치해야 GitHub이 자동 인식

# 워크플로우 이름 (GitHub Actions 탭에 표시됨)
name: Build & Push Frontend Image

# 트리거 조건: 언제 이 워크플로우를 실행할 것인가
on:
  push:
    tags:
      - 'v*' # v로 시작하는 태그가 푸시될 때만 실행 (예: v1.0.0, v2.1.3)

# 환경변수: 아래 jobs에서 ${{ env.XXX }}로 참조 가능
env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/banhyungil/quasar-frontend

# 실행할 작업 목록
jobs:
  build:
    # GitHub이 제공하는 Ubuntu 가상머신에서 실행
    runs-on: ubuntu-latest

    # 이 job에 부여할 권한
    permissions:
      contents: read    # 리포 소스 읽기
      packages: write   # ghcr.io에 이미지 푸시

    # 순차적으로 실행되는 단계들
    steps:
      # 1. 리포지토리 소스코드를 가상머신에 체크아웃
      - uses: actions/checkout@v4

      # 2. ghcr.io에 로그인 (이미지 푸시 권한 획득)
      #    secrets.GITHUB_TOKEN은 GitHub이 자동 제공하는 토큰 (별도 설정 불필요)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}          # 태그를 푸시한 사람
          password: ${{ secrets.GITHUB_TOKEN }}   # GitHub 자동 제공 토큰

      # 3. 태그에서 버전 추출 (v1.0.0 → 1.0.0)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # 4. Docker 이미지 빌드 & ghcr.io에 푸시
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .                              # Dockerfile이 있는 경로
          push: true                              # 빌드 후 레지스트리에 푸시
          build-args: VITE_API_HOST=              # 빈 문자열 → nginx 프록시 사용
          tags: |                                  # 이미지에 붙일 태그 (2개)
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE }}:latest
          # 결과: ghcr.io/banhyungil/quasar-frontend:1.0.0
          #       ghcr.io/banhyungil/quasar-frontend:latest
